# CI for SmithersGUI (ticket 0121).
#
# Builds both the macOS app and the iOS app on every push/PR so the
# cross-platform matrix is exercised continuously. The iOS jobs are the
# part that did not exist before this ticket; the macOS job replaces the
# previously ad-hoc local-only `zig build xcode` path.
#
# Downstream tickets add:
#   0123: libghostty iOS artifact build + linking
#   0124: libsmithers-core iOS static archive build + linking
#   0125: code signing + release upload
#
# Until 0123/0124 land, the iOS target is scaffolding only — it does not
# link libghostty or libsmithers — so CI builds it standalone without the
# Zig prerequisites.

name: CI

on:
  push:
    branches: [main, "initiative/*"]
  pull_request:
    branches: [main, "initiative/*"]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # XcodeGen reads project.yml; pin version via brew for reproducibility.
  XCODEGEN_VERSION: "2.43.0"

jobs:
  # ---------------------------------------------------------------------------
  # Regenerate the Xcode project and fail if project.yml drifted out of sync
  # with the tracked .xcodeproj. Cheap sanity gate that runs before the heavy
  # build jobs.
  # ---------------------------------------------------------------------------
  xcodegen-check:
    name: XcodeGen regenerate
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Regenerate project
        run: xcodegen generate
      - name: Verify .xcodeproj is in sync
        run: |
          # The generated xcodeproj is expected to be committed. If it differs
          # from the checked-in version, fail — developer forgot to regenerate.
          if ! git diff --quiet -- SmithersGUI.xcodeproj; then
            echo "::error::SmithersGUI.xcodeproj is out of sync with project.yml."
            echo "::error::Run 'xcodegen generate' and commit the result."
            git --no-pager diff --stat -- SmithersGUI.xcodeproj
            exit 1
          fi

  # ---------------------------------------------------------------------------
  # macOS app + tests. Uses the zig build shim so libsmithers + libghostty
  # are built first (matching local developer flow).
  # ---------------------------------------------------------------------------
  macos-build:
    name: macOS build & test
    runs-on: macos-14
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app || true
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Install Zig (pinned)
        uses: mlugg/setup-zig@v1
        with:
          version: 0.15.2
      - name: Build libsmithers + libghostty
        run: |
          zig build libsmithers
          zig build ghostty
      - name: Regenerate Xcode project
        run: xcodegen generate
      - name: Build SmithersGUI (macOS)
        run: |
          xcodebuild \
            -project SmithersGUI.xcodeproj \
            -scheme SmithersGUI \
            -destination 'platform=macOS' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build
      - name: Unit tests (macOS)
        run: |
          xcodebuild \
            -project SmithersGUI.xcodeproj \
            -scheme SmithersGUI \
            -destination 'platform=macOS' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            test

  # ---------------------------------------------------------------------------
  # iOS simulator app + tests. No Zig prerequisites until 0123/0124 land the
  # iOS artifacts for libghostty / libsmithers-core. Once those ship, reuse
  # the same zig build steps as the macOS job.
  # ---------------------------------------------------------------------------
  ios-simulator-build:
    name: iOS simulator build & test
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app || true
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Regenerate Xcode project
        run: xcodegen generate
      - name: Show available iOS simulators
        run: xcrun simctl list devices available | grep -E "iPhone" | head -20
      - name: Build SmithersiOS (simulator)
        run: |
          xcodebuild \
            -project SmithersGUI.xcodeproj \
            -scheme SmithersiOS \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build
      - name: Run iOS unit + UI tests (simulator)
        run: |
          xcodebuild \
            -project SmithersGUI.xcodeproj \
            -scheme SmithersiOS \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            test

  # ---------------------------------------------------------------------------
  # Android core canary (ticket 0104).
  #
  # Builds `libsmithers_core.so` for `aarch64-linux-android` via Zig and
  # then assembles the minimal Kotlin app under `poc/android-core/` via
  # the Android Gradle Plugin. This is a CONTINUOUS BUILD CANARY — it
  # exists to fail loudly when a Stage-0/1 change forecloses Android
  # compilation. Required, not advisory: a failure here blocks the PR.
  #
  # No emulator run: spec accepts build-only in CI (emulator runs are
  # dev-local). Runtime smoke is documented in poc/android-core/README.md.
  #
  # NDK version is pinned via the Android SDK manager invocation; bumping
  # it is a real code review event (it can change libc symbols the Zig
  # core links against).
  # ---------------------------------------------------------------------------
  android-core-canary:
    name: Android core canary (build-only)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      ANDROID_NDK_VERSION: "26.3.11579264"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          # Do not pass `packages:` here — the action installs the latest
          # commandlinetools by default. We install the pinned components
          # explicitly below so the NDK version is auditable in this file.
          log-accepted-android-sdk-licenses: false
      - name: Install pinned NDK + platforms
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "ndk;${ANDROID_NDK_VERSION}"
          echo "ANDROID_NDK_ROOT=${ANDROID_HOME}/ndk/${ANDROID_NDK_VERSION}" >> "$GITHUB_ENV"
      - name: Install Zig (pinned)
        uses: mlugg/setup-zig@v1
        with:
          version: 0.15.2
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
      - name: Zig cross-compile sanity check (aarch64-linux-android)
        # Independent verification that the Zig source cross-compiles
        # even before Gradle orchestrates it. Fast-fails when a Zig-side
        # regression breaks the core.
        working-directory: poc/android-core
        run: zig build --release=small
      - name: Report .so size
        working-directory: poc/android-core
        run: |
          if [ -f zig-out/lib/libsmithers_core.so ]; then
            ls -l zig-out/lib/libsmithers_core.so
            echo "size_bytes=$(stat -c%s zig-out/lib/libsmithers_core.so)" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::warning::libsmithers_core.so not emitted (NDK may not have been picked up)."
            ls -l zig-out/lib/ || true
          fi
      - name: Assemble debug APK
        working-directory: poc/android-core
        # Use `gradle` directly — no wrapper jar is checked in; the
        # setup-gradle action provides the binary on PATH.
        run: gradle --no-daemon assembleDebug
      - name: Upload APK artifact (diagnostic)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-core-canary-apk
          path: poc/android-core/app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
          retention-days: 7

  # ---------------------------------------------------------------------------
  # iOS device-slice build (no signing, no deploy). Proves the project is
  # shaped correctly for App Store builds ahead of 0125's signing work.
  # ---------------------------------------------------------------------------
  ios-device-build:
    name: iOS device-slice build (no signing)
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app || true
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Regenerate Xcode project
        run: xcodegen generate
      - name: Build SmithersiOS (device slice, no signing)
        run: |
          xcodebuild \
            -project SmithersGUI.xcodeproj \
            -scheme SmithersiOS \
            -destination 'generic/platform=iOS' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build
