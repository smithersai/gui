name: SmithersGUI
options:
  minimumXcodeGenVersion: 2.43.0
  deploymentTarget:
    macOS: "14.0"
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "-"
packages:
  ViewInspector:
    url: https://github.com/nalexn/ViewInspector.git
    from: "0.10.0"
targets:
  # ---------------------------------------------------------------------------
  # macOS app (existing). Owns every Swift file in the repo root plus the macOS
  # support layer and the macOS-only helper binaries shipped under
  # libsmithers/zig-out/bin. Linker flags and AppKit frameworks are kept
  # macOS-only; the iOS target below does not inherit any of them.
  # ---------------------------------------------------------------------------
  SmithersGUI:
    type: application
    platform: macOS
    sources:
      - AppLogger.swift
      - DevToolsModels.swift
      - DevToolsClientError.swift
      - DevToolsCLITransport.swift
      - LiveRunDevToolsStore.swift
      - HeartbeatState.swift
      - HeartbeatIndicator.swift
      - ElapsedTimeView.swift
      - RunStatusPill.swift
      - LiveRunHeaderView.swift
      - FrameScrubberView.swift
      - RewindConfirmationDialog.swift
      - LiveRunLayout.swift
      - LiveRunView.swift
      - LiveRunTreeExpansionStore.swift
      - LiveRunTreeView.swift
      - TreeRowView.swift
      - LastLogPerNodeStore.swift
      - TreeRowState.swift
      - TreeSearchIndex.swift
      - AncestorErrorIndex.swift
      - TreeKeyboardHandler.swift
      - BrowserSurfaceView.swift
      - DateFormatters.swift
      - DeveloperDebugView.swift
      - GUIControlSidebar.swift
      - GUINotifications.swift
      - AgentsView.swift
      - ApprovalsView.swift
      - ChangesView.swift
      - CommandPaletteView.swift
      - ContentView.swift
      - DetailRouter.swift
      - BootstrapStage.swift
      - SharedNavigation.swift
      - DashboardView.swift
      - IssuesView.swift
      - JJHubWorkflowsView.swift
      - LandingsView.swift
      - LogViewerView.swift
      - MarkdownSurface.swift
      - MarkdownSurfaceView.swift
      - MarkdownEditorView.swift
      - MemoryView.swift
      - Models.swift
      - NewTabPicker.swift
      - NodeInspectView.swift
      - QuickLaunchConfirmSheet.swift
      - NodeInspectorView.swift
      - NodeInspectorHeader.swift
      - OutputTab.swift
      - OutputRenderer.swift
      - OutputPendingView.swift
      - OutputFailedView.swift
      - LogsTab.swift
      - DiffTab.swift
      - DiffFileView.swift
      - DiffHunkView.swift
      - UnifiedDiffParser.swift
      - ChatBlockRenderer.swift
      - ChatBlockMerger.swift
      - ChatBlockFilter.swift
      - PropsTableView.swift
      - PropValueView.swift
      - GhostBanner.swift
      - HandleResolver.swift
      - HistoricalOverlay.swift
      - NodeErrorBanner.swift
      - InspectorTabSwitcher.swift
      - DefaultTabPicker.swift
      - PromptsView.swift
      - RunInspectView.swift
      - RunsView.swift
      - SQLBrowserView.swift
      - ScoresView.swift
      - SearchView.swift
      - SidebarView.swift
      - SmithersModels.swift
      - SurfaceNotificationStore.swift
      - TerminalProcessTracker.swift
      - WelcomeView.swift
      - TerminalView.swift
      # ticket 0123 — shared terminal entry point + macOS bridge.
      - TerminalSurface.swift
      - TerminalView+macOS.swift
      # ticket 0120 — runtime Swift wrapper compiled into the app target
      # (same-module import for the shared terminal surface).
      - path: Shared/Sources/SmithersRuntime
      - StoredShortcut.swift
      - ShortcutAction.swift
      - KeyboardShortcutController.swift
      - KeyboardShortcutRecorder.swift
      - KeyboardShortcutSettings.swift
      - KeyboardShortcutSettingsFileStore.swift
      - TicketsView.swift
      - Theme.swift
      - TriggersView.swift
      - UITestSupport.swift
      - UnifiedDiffView.swift
      - VCSDashboardView.swift
      - ViewLifecycleLogger.swift
      - WorkspaceContentView.swift
      - WorkflowFrontendView.swift
      - WorkspaceSurfaceModels.swift
      - WorkflowsView.swift
      - WorkspacesView.swift
      # ticket 0138 — cross-platform workspace switcher row view.
      - WorkspaceSwitcherView.swift
      - macos/Sources/Smithers
      - path: Shared/Sources/SmithersAuth
        excludes:
          - README.md
      - Shared/Sources/SmithersRuntime
      - path: Shared/Sources/SmithersStore
        excludes:
          - README.md
      # ticket macos-e2e-harness — env-var-gated test hooks (mirrors the
      # iOS wiring). In production builds the whole module is dormant
      # because `E2EEnvironment.parse()` returns nil when PLUE_E2E_MODE
      # is unset, so it is safe to ship.
      - path: Shared/Sources/SmithersE2ESupport
      - path: Resources/MarkdownShell
        type: folder
      # Helper binaries are macOS-only and intentionally NOT bundled into the
      # iOS target below (ticket 0121 acceptance: iOS build graph must not
      # include these).
      - path: libsmithers/zig-out/bin/smithers-session-daemon
        buildPhase: resources
      - path: libsmithers/zig-out/bin/smithers-session-connect
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.smithers.SmithersGUI
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: SmithersGUI
        INFOPLIST_KEY_LSMinimumSystemVersion: "14.0"
        SUPPORTED_PLATFORMS: macosx
        SWIFT_INCLUDE_PATHS: "$(SRCROOT)/CGhosttyKit $(SRCROOT)/CSmithersKit"
        LIBRARY_SEARCH_PATHS: "$(SRCROOT)/ghostty/macos/GhosttyKit.xcframework/macos-arm64 $(SRCROOT)/libsmithers/zig-out/lib $(SRCROOT)/libsmithers"
        OTHER_LDFLAGS: "$(inherited) -lghostty-fat -lsmithers -lc++ -lresolv -lz -lbz2 -lsqlite3"
    dependencies:
      - sdk: Security.framework
      - sdk: SystemConfiguration.framework
      - sdk: Metal.framework
      - sdk: MetalKit.framework
      - sdk: QuartzCore.framework
      - sdk: CoreGraphics.framework
      - sdk: CoreText.framework
      - sdk: IOKit.framework
      - sdk: AppKit.framework
      - sdk: WebKit.framework
      - sdk: Carbon.framework
      - sdk: Foundation.framework
      - sdk: libsqlite3.tbd
      - sdk: AuthenticationServices.framework
      - sdk: CryptoKit.framework
  SmithersGUITests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/SmithersGUITests
        excludes:
          - "**/*ViewTests.swift"
          - "**/*View*Tests.swift"
          - "HighCoverageViewRenderTests.swift"
    dependencies:
      - target: SmithersGUI
      - package: ViewInspector
        product: ViewInspector
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.smithers.SmithersGUITests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: SmithersGUI
        SUPPORTED_PLATFORMS: macosx
        SWIFT_INCLUDE_PATHS: "$(SRCROOT)/CGhosttyKit $(SRCROOT)/CSmithersKit"
        LIBRARY_SEARCH_PATHS: "$(SRCROOT)/ghostty/macos/GhosttyKit.xcframework/macos-arm64 $(SRCROOT)/libsmithers/zig-out/lib $(SRCROOT)/libsmithers"
        OTHER_LDFLAGS: "$(inherited) -lghostty-fat -lsmithers -lc++ -lresolv -lz -lbz2 -lsqlite3"
  SmithersGUIUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: Tests/SmithersGUIUITests
    dependencies:
      - target: SmithersGUI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.smithers.SmithersGUIUITests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: SmithersGUI
        SUPPORTED_PLATFORMS: macosx
  # ---------------------------------------------------------------------------
  # macOS E2E test target (ticket macos-e2e-harness). Full-stack XCUITest
  # bundle that talks to a real plue backend on localhost:4000 via the
  # PLUE_E2E_MODE env-var bypass in SmithersE2ESupport. Mirrors the iOS
  # SmithersiOSE2ETests target. See macos/scripts/run-e2e.sh for the
  # orchestration. Kept distinct from SmithersGUIUITests (the cheap
  # launch-smoke UI test bundle).
  # ---------------------------------------------------------------------------
  SmithersMacOSE2ETests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: macos/Tests/SmithersMacOSE2ETests
    dependencies:
      - target: SmithersGUI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.smithers.SmithersMacOSE2ETests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: SmithersGUI
        SUPPORTED_PLATFORMS: macosx
  # ---------------------------------------------------------------------------
  # iOS app (ticket 0121). Intentionally minimal scaffolding so the build
  # system is real. Downstream tickets expand this target:
  #   - 0122: shared ContentView/SidebarView/etc. get added here.
  #   - 0123: TerminalView portability + libghostty iOS artifact wiring.
  #   - 0124: libsmithers-core iOS static archive linkage.
  #   - 0125: code signing + release plumbing.
  #
  # The target explicitly does NOT link AppKit, and does NOT bundle the
  # macOS-only `smithers-session-daemon` / `smithers-session-connect` helper
  # binaries. Both are macOS-only in the SmithersGUI target above.
  # ---------------------------------------------------------------------------
  SmithersiOS:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ios/Sources/SmithersiOS
        excludes:
          - Info.plist
      - path: Shared/Sources/SmithersAuth
      # ticket 0123 — shared terminal surface (compiles for macOS + iOS).
      - TerminalSurface.swift
      # Foundation-only helper that the shared surface uses to gate the
      # UITest placeholder branch. Compiles on both platforms.
      - UITestSupport.swift
      # ticket 0120 — runtime Swift wrapper. iOS terminal surface reads
      # PTY bytes from here, not from the macOS-only session daemon.
      - path: Shared/Sources/SmithersRuntime
      # ticket 0122 — shared navigation/state model (route vocabulary
      # compiles for both platforms).
      - SharedNavigation.swift
      # ticket 0124 — shared store layer that reads cached shape rows
      # and dispatches HTTP writes through the runtime.
      - path: Shared/Sources/SmithersStore
        excludes:
          - README.md
      # ticket 0138 — cross-platform workspace switcher view + iOS
      # full-screen presenter. Compiles for iOS. Remote-only surface;
      # desktop's Local-recents section stays on the macOS side.
      - WorkspaceSwitcherView.swift
      # ticket ios-e2e-harness — env-var-gated test hooks. In production
      # builds the whole module is dormant (E2EEnvironment.parse()
      # returns nil when PLUE_E2E_MODE is unset), so it is safe to ship
      # in the App Store binary.
      - path: Shared/Sources/SmithersE2ESupport
    settings:
      base:
        # Ticket 0125: bundle id is the canonical App Store Connect identifier.
        # Registering a different id in ASC will break upload; this value is
        # the knob the user plugs into https://appstoreconnect.apple.com/.
        PRODUCT_BUNDLE_IDENTIFIER: com.smithers.ios
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: ios/Sources/SmithersiOS/Info.plist
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        SUPPORTS_MACCATALYST: NO
        CODE_SIGN_ENTITLEMENTS: ios/SmithersiOS.entitlements
        # Ticket 0125: versioning.
        #   MARKETING_VERSION      = CFBundleShortVersionString (e.g. 0.1.0).
        #   CURRENT_PROJECT_VERSION = CFBundleVersion           (monotonic int).
        # Both are overridden from CI: see .github/workflows/ios-testflight.yml
        # which passes MARKETING_VERSION + CURRENT_PROJECT_VERSION on the
        # xcodebuild archive command line. The defaults below are for
        # developer-local archives when CI is not driving the build.
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        # Ticket 0125: signing knobs.
        #
        # Debug (simulator + CI device-slice): signing disabled. The
        # `configs` overrides below flip `CODE_SIGNING_ALLOWED=NO` back on
        # for Debug so `xcodebuild build` on the simulator continues to
        # work without a provisioning profile.
        #
        # Release (archive/TestFlight): manual signing, team + profile
        # supplied by the user (see ios/RELEASE.md). DEVELOPMENT_TEAM is
        # intentionally empty by default — overridden on the xcodebuild
        # command line in CI, or via `xcconfig` locally. An empty value
        # surfaces as a signing failure (loud), not a simulator-slice
        # archive (silent wrong behavior).
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "Apple Distribution"
        DEVELOPMENT_TEAM: ""
        PROVISIONING_PROFILE_SPECIFIER: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
      configs:
        Debug:
          # Developer + CI simulator builds: no signing at all. The
          # `ios-simulator-build` and `ios-device-build` jobs in ci.yml
          # rely on this to produce an unsigned .app.
          CODE_SIGNING_REQUIRED: NO
          CODE_SIGNING_ALLOWED: NO
          CODE_SIGN_IDENTITY: ""
        Release:
          # Archive + TestFlight path. Enable signing and require it so a
          # misconfigured archive fails early instead of shipping an
          # unsigned .ipa. DEVELOPMENT_TEAM / PROVISIONING_PROFILE_SPECIFIER
          # are supplied by CI or by the user's local build command.
          CODE_SIGNING_REQUIRED: YES
          CODE_SIGNING_ALLOWED: YES
          CODE_SIGN_IDENTITY: "Apple Distribution"
    dependencies:
      - sdk: Foundation.framework
      - sdk: UIKit.framework
      - sdk: SwiftUI.framework
      - sdk: AuthenticationServices.framework
      - sdk: CryptoKit.framework
      - sdk: Security.framework
  SmithersiOSTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ios/Tests/SmithersiOSTests
    dependencies:
      - target: SmithersiOS
      - package: ViewInspector
        product: ViewInspector
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.smithers.SmithersiOSTests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: SmithersiOS
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        SUPPORTS_MACCATALYST: NO
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
  SmithersiOSUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ios/Tests/SmithersiOSUITests
    dependencies:
      - target: SmithersiOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.smithers.SmithersiOSUITests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: SmithersiOS
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        SUPPORTS_MACCATALYST: NO
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
  # ---------------------------------------------------------------------------
  # iOS E2E test target (ticket ios-e2e-harness). Full-stack XCUITest bundle
  # that talks to a real plue backend on localhost:4000 via the PLUE_E2E_MODE
  # env-var bypass in SmithersE2ESupport. See ios/scripts/run-e2e.sh for the
  # orchestration. DISTINCT from SmithersiOSUITests (which is the unit-y
  # launch smoke bundle from 0121) — keep them separate so the cheap launch
  # test runs on every PR but the expensive e2e suite only runs on main.
  # ---------------------------------------------------------------------------
  SmithersiOSE2ETests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ios/Tests/SmithersiOSE2ETests
    dependencies:
      - target: SmithersiOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.smithers.SmithersiOSE2ETests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: SmithersiOS
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        SUPPORTS_MACCATALYST: NO
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
schemes:
  SmithersGUI:
    build:
      targets:
        SmithersGUI: all
        SmithersGUITests: [test]
        SmithersGUIUITests: [test]
    test:
      targets:
        - SmithersGUITests
        - SmithersGUIUITests
      gatherCoverageData: false
  # Dedicated scheme for the macOS full-stack E2E bundle. Mirrors the
  # SmithersiOSE2ETests scheme. Scheme-level environment variables are
  # the reliable path to thread values into the XCUITest runner's
  # `ProcessInfo` — `${...}` macros resolve at test time from the
  # invoking process environment, so `macos/scripts/run-e2e.sh` just
  # exports these and calls xcodebuild.
  SmithersMacOSE2ETests:
    build:
      targets:
        SmithersGUI: all
        SmithersMacOSE2ETests: [test]
    test:
      environmentVariables:
        - variable: SMITHERS_E2E_BEARER
          value: $(SMITHERS_E2E_BEARER)
          isEnabled: true
        - variable: PLUE_BASE_URL
          value: $(PLUE_BASE_URL)
          isEnabled: true
        - variable: PLUE_E2E_MODE
          value: $(PLUE_E2E_MODE)
          isEnabled: true
        - variable: PLUE_REMOTE_SANDBOX_ENABLED
          value: $(PLUE_REMOTE_SANDBOX_ENABLED)
          isEnabled: true
        - variable: PLUE_E2E_SEEDED
          value: $(PLUE_E2E_SEEDED)
          isEnabled: true
        - variable: PLUE_E2E_SEEDED_WORKSPACE_TITLE
          value: $(PLUE_E2E_SEEDED_WORKSPACE_TITLE)
          isEnabled: true
        - variable: PLUE_E2E_WORKSPACE_ID
          value: $(PLUE_E2E_WORKSPACE_ID)
          isEnabled: true
        - variable: SMITHERS_E2E_REFRESH
          value: $(SMITHERS_E2E_REFRESH)
          isEnabled: true
      targets:
        - SmithersMacOSE2ETests
      gatherCoverageData: false
  SmithersiOS:
    build:
      targets:
        SmithersiOS: all
        SmithersiOSTests: [test]
        SmithersiOSUITests: [test]
    test:
      targets:
        - SmithersiOSTests
        - SmithersiOSUITests
      gatherCoverageData: false
  # Dedicated scheme for the full-stack E2E bundle. Kept separate from
  # the `SmithersiOS` scheme so `xcodebuild -scheme SmithersiOSE2ETests test`
  # runs ONLY the e2e bundle and does not re-run the launch smoke test.
  #
  # The scheme points at `SmithersiOSE2ETests.xctestplan` whose
  # `environmentVariableEntries` use `$(SMITHERS_E2E_BEARER)` etc. so
  # values come from the xcodebuild invocation's process environment.
  # This is the only reliable way to thread env vars into an XCUITest
  # runner process — direct `-env` or shell env inheritance does not
  # propagate through the test host on iOS.
  SmithersiOSE2ETests:
    build:
      targets:
        SmithersiOS: all
        SmithersiOSE2ETests: [test]
    test:
      # Scheme-level environment variables are the reliable path to
      # thread values into the XCUITest runner's `ProcessInfo`. Values
      # use `${...}` macros that xcodebuild resolves at test time from
      # the invoking process environment — so `ios/scripts/run-e2e.sh`
      # just exports these and calls xcodebuild. No xctestplan needed
      # (xcodegen 2.43's testPlans wiring emits an empty block on our
      # machine; this path is known-good).
      environmentVariables:
        - variable: SMITHERS_E2E_BEARER
          value: $(SMITHERS_E2E_BEARER)
          isEnabled: true
        - variable: PLUE_BASE_URL
          value: $(PLUE_BASE_URL)
          isEnabled: true
        - variable: PLUE_E2E_SEEDED
          value: $(PLUE_E2E_SEEDED)
          isEnabled: true
        - variable: PLUE_E2E_SEEDED_WORKSPACE_TITLE
          value: $(PLUE_E2E_SEEDED_WORKSPACE_TITLE)
          isEnabled: true
        - variable: PLUE_E2E_WORKSPACE_ID
          value: $(PLUE_E2E_WORKSPACE_ID)
          isEnabled: true
        - variable: SMITHERS_E2E_REFRESH
          value: $(SMITHERS_E2E_REFRESH)
          isEnabled: true
        # Scenario-group env vars (ios-e2e-harness phase 2).
        #   terminal scenario: workspace_session id.
        #   approvals scenario: agent_session + approval id, plus repo
        #     owner/name for the `/api/repos/{owner}/{repo}/approvals/{id}/decide`
        #     route.
        #   reconnect scenario: docker container name for host-side pauses.
        - variable: PLUE_E2E_WORKSPACE_SESSION_ID
          value: $(PLUE_E2E_WORKSPACE_SESSION_ID)
          isEnabled: true
        - variable: PLUE_E2E_AGENT_SESSION_ID
          value: $(PLUE_E2E_AGENT_SESSION_ID)
          isEnabled: true
        - variable: PLUE_E2E_APPROVAL_ID
          value: $(PLUE_E2E_APPROVAL_ID)
          isEnabled: true
        - variable: PLUE_E2E_REPO_ID
          value: $(PLUE_E2E_REPO_ID)
          isEnabled: true
        - variable: PLUE_E2E_REPO_OWNER
          value: $(PLUE_E2E_REPO_OWNER)
          isEnabled: true
        - variable: PLUE_E2E_REPO_NAME
          value: $(PLUE_E2E_REPO_NAME)
          isEnabled: true
        - variable: PLUE_E2E_DOCKER_API_CONTAINER
          value: $(PLUE_E2E_DOCKER_API_CONTAINER)
          isEnabled: true
      targets:
        - SmithersiOSE2ETests
      gatherCoverageData: false
