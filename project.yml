name: SmithersGUI
options:
  minimumXcodeGenVersion: 2.43.0
  deploymentTarget:
    macOS: "14.0"
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "-"
packages:
  ViewInspector:
    url: https://github.com/nalexn/ViewInspector.git
    from: "0.10.0"
targets:
  # ---------------------------------------------------------------------------
  # macOS app (existing). Owns every Swift file in the repo root plus the macOS
  # support layer and the macOS-only helper binaries shipped under
  # libsmithers/zig-out/bin. Linker flags and AppKit frameworks are kept
  # macOS-only; the iOS target below does not inherit any of them.
  # ---------------------------------------------------------------------------
  SmithersGUI:
    type: application
    platform: macOS
    sources:
      - AppLogger.swift
      - DevToolsModels.swift
      - DevToolsClientError.swift
      - DevToolsCLITransport.swift
      - LiveRunDevToolsStore.swift
      - HeartbeatState.swift
      - HeartbeatIndicator.swift
      - ElapsedTimeView.swift
      - RunStatusPill.swift
      - LiveRunHeaderView.swift
      - FrameScrubberView.swift
      - RewindConfirmationDialog.swift
      - LiveRunLayout.swift
      - LiveRunView.swift
      - LiveRunTreeExpansionStore.swift
      - LiveRunTreeView.swift
      - TreeRowView.swift
      - LastLogPerNodeStore.swift
      - TreeRowState.swift
      - TreeSearchIndex.swift
      - AncestorErrorIndex.swift
      - TreeKeyboardHandler.swift
      - BrowserSurfaceView.swift
      - DateFormatters.swift
      - DeveloperDebugView.swift
      - GUIControlSidebar.swift
      - GUINotifications.swift
      - AgentsView.swift
      - ApprovalsView.swift
      - ChangesView.swift
      - CommandPaletteView.swift
      - ContentView.swift
      - DetailRouter.swift
      - BootstrapStage.swift
      - SharedNavigation.swift
      - DashboardView.swift
      - IssuesView.swift
      - JJHubWorkflowsView.swift
      - LandingsView.swift
      - LogViewerView.swift
      - MarkdownSurface.swift
      - MarkdownSurfaceView.swift
      - MarkdownEditorView.swift
      - MemoryView.swift
      - Models.swift
      - NewTabPicker.swift
      - NodeInspectView.swift
      - QuickLaunchConfirmSheet.swift
      - NodeInspectorView.swift
      - NodeInspectorHeader.swift
      - OutputTab.swift
      - OutputRenderer.swift
      - OutputPendingView.swift
      - OutputFailedView.swift
      - LogsTab.swift
      - DiffTab.swift
      - DiffFileView.swift
      - DiffHunkView.swift
      - UnifiedDiffParser.swift
      - ChatBlockRenderer.swift
      - ChatBlockMerger.swift
      - ChatBlockFilter.swift
      - PropsTableView.swift
      - PropValueView.swift
      - GhostBanner.swift
      - HandleResolver.swift
      - HistoricalOverlay.swift
      - NodeErrorBanner.swift
      - InspectorTabSwitcher.swift
      - DefaultTabPicker.swift
      - PromptsView.swift
      - RunInspectView.swift
      - RunsView.swift
      - SQLBrowserView.swift
      - ScoresView.swift
      - SearchView.swift
      - SidebarView.swift
      - SmithersModels.swift
      - SurfaceNotificationStore.swift
      - TerminalProcessTracker.swift
      - WelcomeView.swift
      - TerminalView.swift
      # ticket 0123 — shared terminal entry point + macOS bridge.
      - TerminalSurface.swift
      - TerminalView+macOS.swift
      # ticket 0120 — runtime Swift wrapper compiled into the app target
      # (same-module import for the shared terminal surface).
      - path: Shared/Sources/SmithersRuntime
      - StoredShortcut.swift
      - ShortcutAction.swift
      - KeyboardShortcutController.swift
      - KeyboardShortcutRecorder.swift
      - KeyboardShortcutSettings.swift
      - KeyboardShortcutSettingsFileStore.swift
      - TicketsView.swift
      - Theme.swift
      - TriggersView.swift
      - UITestSupport.swift
      - UnifiedDiffView.swift
      - VCSDashboardView.swift
      - ViewLifecycleLogger.swift
      - WorkspaceContentView.swift
      - WorkflowFrontendView.swift
      - WorkspaceSurfaceModels.swift
      - WorkflowsView.swift
      - WorkspacesView.swift
      - macos/Sources/Smithers
      - Shared/Sources/SmithersAuth
      - path: Resources/MarkdownShell
        type: folder
      # Helper binaries are macOS-only and intentionally NOT bundled into the
      # iOS target below (ticket 0121 acceptance: iOS build graph must not
      # include these).
      - path: libsmithers/zig-out/bin/smithers-session-daemon
        buildPhase: resources
      - path: libsmithers/zig-out/bin/smithers-session-connect
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.smithers.SmithersGUI
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: SmithersGUI
        INFOPLIST_KEY_LSMinimumSystemVersion: "14.0"
        SUPPORTED_PLATFORMS: macosx
        SWIFT_INCLUDE_PATHS: "$(SRCROOT)/CGhosttyKit $(SRCROOT)/CSmithersKit"
        LIBRARY_SEARCH_PATHS: "$(SRCROOT)/ghostty/macos/GhosttyKit.xcframework/macos-arm64 $(SRCROOT)/libsmithers/zig-out/lib $(SRCROOT)/libsmithers"
        OTHER_LDFLAGS: "$(inherited) -lghostty-fat -lsmithers -lc++ -lresolv -lz -lbz2 -lsqlite3"
    dependencies:
      - sdk: Security.framework
      - sdk: SystemConfiguration.framework
      - sdk: Metal.framework
      - sdk: MetalKit.framework
      - sdk: QuartzCore.framework
      - sdk: CoreGraphics.framework
      - sdk: CoreText.framework
      - sdk: IOKit.framework
      - sdk: AppKit.framework
      - sdk: WebKit.framework
      - sdk: Carbon.framework
      - sdk: Foundation.framework
      - sdk: libsqlite3.tbd
      - sdk: AuthenticationServices.framework
      - sdk: CryptoKit.framework
  SmithersGUITests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/SmithersGUITests
        excludes:
          - "**/*ViewTests.swift"
          - "**/*View*Tests.swift"
          - "HighCoverageViewRenderTests.swift"
    dependencies:
      - target: SmithersGUI
      - package: ViewInspector
        product: ViewInspector
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.smithers.SmithersGUITests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: SmithersGUI
        SUPPORTED_PLATFORMS: macosx
        SWIFT_INCLUDE_PATHS: "$(SRCROOT)/CGhosttyKit $(SRCROOT)/CSmithersKit"
        LIBRARY_SEARCH_PATHS: "$(SRCROOT)/ghostty/macos/GhosttyKit.xcframework/macos-arm64 $(SRCROOT)/libsmithers/zig-out/lib $(SRCROOT)/libsmithers"
        OTHER_LDFLAGS: "$(inherited) -lghostty-fat -lsmithers -lc++ -lresolv -lz -lbz2 -lsqlite3"
  SmithersGUIUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: Tests/SmithersGUIUITests
    dependencies:
      - target: SmithersGUI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.smithers.SmithersGUIUITests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: SmithersGUI
        SUPPORTED_PLATFORMS: macosx
  # ---------------------------------------------------------------------------
  # iOS app (ticket 0121). Intentionally minimal scaffolding so the build
  # system is real. Downstream tickets expand this target:
  #   - 0122: shared ContentView/SidebarView/etc. get added here.
  #   - 0123: TerminalView portability + libghostty iOS artifact wiring.
  #   - 0124: libsmithers-core iOS static archive linkage.
  #   - 0125: code signing + release plumbing.
  #
  # The target explicitly does NOT link AppKit, and does NOT bundle the
  # macOS-only `smithers-session-daemon` / `smithers-session-connect` helper
  # binaries. Both are macOS-only in the SmithersGUI target above.
  # ---------------------------------------------------------------------------
  SmithersiOS:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ios/Sources/SmithersiOS
        excludes:
          - Info.plist
      - path: Shared/Sources/SmithersAuth
      # ticket 0123 — shared terminal surface (compiles for macOS + iOS).
      - TerminalSurface.swift
      # Foundation-only helper that the shared surface uses to gate the
      # UITest placeholder branch. Compiles on both platforms.
      - UITestSupport.swift
      # ticket 0120 — runtime Swift wrapper. iOS terminal surface reads
      # PTY bytes from here, not from the macOS-only session daemon.
      - path: Shared/Sources/SmithersRuntime
      # ticket 0122 — shared navigation/state model (route vocabulary
      # compiles for both platforms).
      - SharedNavigation.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.smithers.SmithersiOS
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: ios/Sources/SmithersiOS/Info.plist
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        SUPPORTS_MACCATALYST: NO
        # Manual placeholder signing. 0125 replaces this with real identities.
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
        DEVELOPMENT_TEAM: ""
    dependencies:
      - sdk: Foundation.framework
      - sdk: UIKit.framework
      - sdk: SwiftUI.framework
      - sdk: AuthenticationServices.framework
      - sdk: CryptoKit.framework
      - sdk: Security.framework
  SmithersiOSTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ios/Tests/SmithersiOSTests
    dependencies:
      - target: SmithersiOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.smithers.SmithersiOSTests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: SmithersiOS
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        SUPPORTS_MACCATALYST: NO
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
  SmithersiOSUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ios/Tests/SmithersiOSUITests
    dependencies:
      - target: SmithersiOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.smithers.SmithersiOSUITests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: SmithersiOS
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        SUPPORTS_MACCATALYST: NO
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
schemes:
  SmithersGUI:
    build:
      targets:
        SmithersGUI: all
        SmithersGUITests: [test]
        SmithersGUIUITests: [test]
    test:
      targets:
        - SmithersGUITests
        - SmithersGUIUITests
      gatherCoverageData: false
  SmithersiOS:
    build:
      targets:
        SmithersiOS: all
        SmithersiOSTests: [test]
        SmithersiOSUITests: [test]
    test:
      targets:
        - SmithersiOSTests
        - SmithersiOSUITests
      gatherCoverageData: false
